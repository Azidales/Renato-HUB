<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké Catcher - Violet</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?v=3.4.17"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.469.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .pokeball-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-24 md:pb-10 min-h-screen">
    <div class="max-w-4xl mx-auto px-6 pt-10 md:pt-16">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 bg-white rounded-xl shadow-sm border border-slate-100 text-slate-400 hover:text-purple-600 transition shrink-0">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="text-2xl md:text-3xl font-800 tracking-tighter italic uppercase text-slate-900 leading-none">Poké<span class="text-purple-600">Catcher</span></h1>
                    <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Geração 9 • Violet</p>
                </div>
            </div>
            <!-- Empty right space to keep balance or can be used for extra icons -->
        </header>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <!-- Left Column: Battle Context -->
            <div class="md:col-span-5 space-y-6">
                <section class="p-6 bg-white rounded-3xl shadow-lg shadow-purple-900/5 border border-purple-100">
                    <h2 class="text-sm font-bold uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="crosshairs" class="w-4 h-4"></i> Batalha Atual
                    </h2>
                    
                    <!-- Search Pokemon -->
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Espécie Selvagem</label>
                        <div class="relative">
                            <i data-lucide="search" class="w-5 h-5 absolute left-3 top-3 text-slate-300"></i>
                            <input type="text" id="pokemonInput" placeholder="Ex: Lechonk" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:bg-white text-sm font-semibold transition" autocomplete="off">
                            <div id="searchResults" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                        </div>
                        <div id="selectedPokemonInfo" class="mt-2 text-xs text-purple-600 font-bold hidden flex items-center gap-1">
                            <i data-lucide="check-circle" class="w-3 h-3"></i> <span></span>
                        </div>
                    </div>

                    <!-- HP -->
                    <div class="mb-4">
                        <div class="flex justify-between items-end mb-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase">HP Restante (%)</label>
                            <span id="hpValueLabel" class="text-xs font-black text-slate-700">100%</span>
                        </div>
                        <input type="range" id="hpSlider" min="1" max="100" value="100" class="w-full accent-purple-600 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <!-- Status Condition -->
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Condição de Status</label>
                        <select id="statusSelect" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:bg-white text-sm font-semibold transition appearance-none">
                            <option value="none">Nenhum</option>
                            <option value="sleep">Dormindo (Sleep)</option>
                            <option value="freeze">Congelado (Freeze)</option>
                            <option value="paralyze">Paralisado (Paralyze)</option>
                            <option value="poison">Envenenado (Poison)</option>
                            <option value="burn">Queimado (Burn)</option>
                        </select>
                    </div>

                    <!-- Level & Badges -->
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Nível Selvagem</label>
                            <input type="number" id="pokemonLevel" value="20" min="1" max="100" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-center appearance-none focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Suas Insígnias</label>
                            <select id="badgesCount" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold focus:outline-none focus:ring-2 focus:ring-purple-600 appearance-none text-center">
                                <option value="0">0 Insígnias (Obedece ≤20)</option>
                                <option value="1">1 Insígnia (Obedece ≤25)</option>
                                <option value="2">2 Insígnias (Obedece ≤30)</option>
                                <option value="3">3 Insígnias (Obedece ≤35)</option>
                                <option value="4">4 Insígnias (Obedece ≤40)</option>
                                <option value="5">5 Insígnias (Obedece ≤45)</option>
                                <option value="6">6 Insígnias (Obedece ≤50)</option>
                                <option value="7">7 Insígnias (Obedece ≤55)</option>
                                <option value="8" selected>8 Insígnias (Obedece todos)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Environment & Rules -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase text-center">Turno</label>
                            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-purple-600 h-[38px]">
                                <button type="button" id="btnDecTurn" class="w-10 h-full text-slate-400 hover:text-purple-600 hover:bg-slate-100 transition flex items-center justify-center border-r border-slate-200 shrink-0">
                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                </button>
                                <input type="number" id="turnCount" value="1" min="1" class="w-full h-full bg-transparent text-sm font-bold text-center appearance-none focus:outline-none m-0 p-0" style="-moz-appearance: textfield;">
                                <button type="button" id="btnIncTurn" class="w-10 h-full text-slate-400 hover:text-purple-600 hover:bg-slate-100 transition flex items-center justify-center border-l border-slate-200 shrink-0">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <style>input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }</style>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Período/Local</label>
                            <select id="timeSelect" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold focus:outline-none focus:ring-2 focus:ring-purple-600 appearance-none">
                                <option value="day">Dia / Externo</option>
                                <option value="night">Noite / Caverna</option>
                            </select>
                        </div>
                    </div>
                </section>
                
                <!-- Player Context (Passives) -->
                <section class="p-6 bg-white rounded-3xl shadow-md border border-slate-100">
                    <h2 class="text-sm font-bold uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i> Bônus do Jogador
                    </h2>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="catchingCharm" class="w-5 h-5 accent-purple-600 rounded text-purple-600 focus:ring-purple-500 cursor-pointer">
                            <span class="text-sm font-semibold text-slate-700">Catching Charm Ativo</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="registeredPokedex" class="w-5 h-5 accent-purple-600 rounded text-purple-600 focus:ring-purple-500 cursor-pointer">
                            <span class="text-sm font-semibold text-slate-700">Já Registrado na Pokédex (Crit Catch)</span>
                        </label>
                    </div>
                </section>
            </div>

            <!-- Right Column: Results Dashboard -->
            <div class="md:col-span-7">
                <section class="h-full flex flex-col">
                    <h2 class="text-sm font-bold uppercase text-slate-400 tracking-widest mb-4 flex items-center justify-between">
                        <span class="flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Recomendações</span>
                        <span id="baseCatchRateLabel" class="text-[10px] bg-slate-200 text-slate-500 px-2 py-1 rounded-md hidden">Base: --</span>
                    </h2>

                    <!-- Empty state -->
                    <div id="emptyState" class="flex-1 min-h-[300px] flex flex-col items-center justify-center p-8 bg-white/50 border-2 border-dashed border-slate-200 rounded-3xl text-center">
                        <div class="w-16 h-16 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="help-circle" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-600">Aguardando Dados</h3>
                        <p class="text-xs text-slate-400 font-semibold mt-2 max-w-[200px] mx-auto">Busque um Pokémon acima para calcular as probabilidades.</p>
                    </div>

                    <!-- Results list -->
                    <div id="resultsList" class="space-y-3 hidden">
                        <!-- Items will be injected via JS -->
                    </div>
                </section>
            </div>

        </div>
    </div>

    <!-- Core App Logic -->
    <script>
        lucide.createIcons();

        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const SV_CONSTANTS = {
            MAX_CATCH_VALUE: 255,
            BASE_SHAKE_PROB: 65536,
            CRIT_DENOMINATOR: 6,
            CRIT_MAX_PROB: 256,
            SHAKE_CHECKS: 4,
            OBEDIENCE_LEVELS: [20, 25, 30, 35, 40, 45, 50, 55, 100],
            PENALTY_MULTIPLIER: 0.8
        };

        // ==========================================
        // 2. STATE MANAGEMENT (MODEL)
        // ==========================================
        const state = {
            pokemon: null,      // { name, captureRate }
            pokeTypes: [],
            hpPercent: 100,
            status: 'none',
            pokemonLevel: 20,
            playerBadges: 8,
            turn: 1,
            timeEnvironment: 'day',
            catchingCharm: false,
            registeredDex: false
        };

        // ==========================================
        // 3. POKEMON SERVICE (INFRASTRUCTURE LAYER)
        // ==========================================
        class PokemonAPI {
            constructor() {
                this.cache = {};
                this.speciesList = [];
            }

            async preloadSpecies() {
                try {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=1500');
                    if (!res.ok) throw new Error('API Indisponível');
                    const data = await res.json();
                    this.speciesList = data.results.map(p => p.name);
                } catch (err) {
                    console.error('[PokemonAPI] Falha ao pre-carregar lista de espécies:', err);
                }
            }

            fuzzySearch(query) {
                if (!query || query.length < 2) return [];
                return this.speciesList.filter(name => name.includes(query)).slice(0, 8);
            }

            async fetchDetails(name) {
                if (this.cache[name]) return this.cache[name];
                
                const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                if (!speciesRes.ok) throw new Error("Espécie não encontrada na API");
                const speciesData = await speciesRes.json();
                
                let types = [];
                try {
                    const pkmnRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${speciesData.id}`);
                    if (pkmnRes.ok) {
                        const pkmnData = await pkmnRes.json();
                        types = pkmnData.types.map(t => t.type.name);
                    }
                } catch(e) {
                    console.warn('[PokemonAPI] Aviso: Tipos de combate indisponíveis.', e);
                }
                
                const details = { 
                    name: speciesData.name, 
                    captureRate: speciesData.capture_rate, 
                    types 
                };
                
                this.cache[name] = details;
                return details;
            }
        }

        // ==========================================
        // 4. MATH ENGINE (DOMAIN LOGIC)
        // - Pure entity methods. No UI dependencies.
        // ==========================================
        class CatchMechanicsEngine {
            static _getHPMultiplier(hpPercent) {
                const fraction = hpPercent / 100;
                return (3 - (2 * fraction)) / 3;
            }

            static _getBadgePenalty(wildLevel, badges) {
                let requiredBadges = 0;
                for (let i = 0; i < SV_CONSTANTS.OBEDIENCE_LEVELS.length; i++) {
                    if (wildLevel <= SV_CONSTANTS.OBEDIENCE_LEVELS[i]) {
                        requiredBadges = i;
                        break;
                    }
                }
                if (badges < requiredBadges) {
                    return Math.pow(SV_CONSTANTS.PENALTY_MULTIPLIER, requiredBadges - badges);
                }
                return 1.0;
            }

            static _getLowLevelModifier(level) {
                return (level <= 13) ? (36 - 2 * level) / 10 : 1.0;
            }

            static _getStatusModifier(status) {
                if (['sleep', 'freeze'].includes(status)) return 2.5;
                if (['paralyze', 'poison', 'burn'].includes(status)) return 1.5;
                return 1.0;
            }

            static _getAvailableBalls(ctx) {
                return [
                    { name: 'Poké Ball', id: 'poke', color: 'bg-red-50 text-red-600', border:'border-red-100', modifier: 1 },
                    { name: 'Great Ball', id: 'great', color: 'bg-blue-50 text-blue-600', border:'border-blue-100', modifier: 1.5 },
                    { name: 'Ultra Ball', id: 'ultra', color: 'bg-yellow-50 text-yellow-600', border:'border-yellow-200', modifier: 2.0 },
                    { name: 'Quick Ball', id: 'quick', color: 'bg-cyan-50 text-cyan-600', border:'border-cyan-100', modifier: ctx.turn === 1 ? 5.0 : 1.0 },
                    { name: 'Dusk Ball', id: 'dusk', color: 'bg-green-50 text-green-700', border:'border-green-200', modifier: ctx.timeEnvironment === 'night' ? 3.0 : 1.0 },
                    { name: 'Timer Ball', id: 'timer', color: 'bg-orange-50 text-orange-600', border:'border-orange-100', modifier: Math.min(1 + ((ctx.turn - 1) * 0.3), 4.0) },
                    { name: 'Net Ball', id: 'net', color: 'bg-sky-50 text-sky-600', border:'border-sky-100', modifier: (ctx.pokeTypes.includes('water') || ctx.pokeTypes.includes('bug')) ? 3.5 : 1.0 },
                    { name: 'Repeat Ball', id: 'repeat', color: 'bg-rose-50 text-rose-600', border:'border-rose-100', modifier: ctx.registeredDex ? 3.5 : 1.0 }
                ];
            }

            static executeCatchRolls(ctx) {
                if (!ctx.pokemon) return [];

                const hpMod = this._getHPMultiplier(ctx.hpPercent);
                const badgePen = this._getBadgePenalty(ctx.pokemonLevel, ctx.playerBadges);
                const lvlMod = this._getLowLevelModifier(ctx.pokemonLevel);
                const statMod = this._getStatusModifier(ctx.status);
                
                const balls = this._getAvailableBalls(ctx);

                return balls.map(ball => {
                    const baseA = hpMod * ctx.pokemon.captureRate * ball.modifier * statMod * badgePen * lvlMod;
                    
                    let catchProb = 0;
                    if (baseA >= SV_CONSTANTS.MAX_CATCH_VALUE) {
                        catchProb = 100;
                    } else {
                        // Shake Pass Probability
                        const bVal = SV_CONSTANTS.BASE_SHAKE_PROB * Math.pow(baseA / SV_CONSTANTS.MAX_CATCH_VALUE, 0.25);
                        const pShake = bVal / SV_CONSTANTS.BASE_SHAKE_PROB;
                        
                        // Critical Catch Probability
                        const dexMod = ctx.registeredDex ? 2.0 : 0; 
                        const charmMod = ctx.catchingCharm ? 2.0 : 1.0;
                        const cVal = Math.floor((baseA * dexMod * charmMod) / SV_CONSTANTS.CRIT_DENOMINATOR);
                        const pCrit = Math.min(1, Math.max(0, cVal / SV_CONSTANTS.CRIT_MAX_PROB));
                        
                        // Bayesian union of mutually exclusive catch scenarios
                        const pTotal = (pCrit * pShake) + ((1 - pCrit) * Math.pow(pShake, SV_CONSTANTS.SHAKE_CHECKS));
                        catchProb = Math.min(100, Math.max(0, pTotal * 100));
                    }
                    return { ...ball, prob: catchProb };
                }).sort((a, b) => b.prob - a.prob);
            }
        }

        // ==========================================
        // 5. VIEW CONTROLLER (PRESENTER)
        // ==========================================
        class AppController {
            constructor() {
                this.api = new PokemonAPI();
                this.ui = {
                    pokemonInput: document.getElementById('pokemonInput'),
                    searchResults: document.getElementById('searchResults'),
                    selectedInfo: document.getElementById('selectedPokemonInfo'),
                    hpSlider: document.getElementById('hpSlider'),
                    hpLabel: document.getElementById('hpValueLabel'),
                    statusSelect: document.getElementById('statusSelect'),
                    pokemonLevel: document.getElementById('pokemonLevel'),
                    badgesCount: document.getElementById('badgesCount'),
                    turnCount: document.getElementById('turnCount'),
                    btnDecTurn: document.getElementById('btnDecTurn'),
                    btnIncTurn: document.getElementById('btnIncTurn'),
                    timeSelect: document.getElementById('timeSelect'),
                    catchingCharm: document.getElementById('catchingCharm'),
                    registeredDex: document.getElementById('registeredPokedex'),
                    emptyState: document.getElementById('emptyState'),
                    resultsList: document.getElementById('resultsList'),
                    baseCatchRateLabel: document.getElementById('baseCatchRateLabel')
                };

                this.bindEvents();
                this.api.preloadSpecies();
            }

            bindEvents() {
                this.ui.hpSlider.addEventListener('input', (e) => this.handleInput('hpPercent', parseInt(e.target.value), () => {
                    this.ui.hpLabel.textContent = state.hpPercent + '%';
                }));
                this.ui.statusSelect.addEventListener('change', (e) => this.handleInput('status', e.target.value));
                this.ui.pokemonLevel.addEventListener('input', (e) => this.handleInput('pokemonLevel', this.clampNumber(e.target.value, 1, 100)));
                this.ui.badgesCount.addEventListener('change', (e) => this.handleInput('playerBadges', parseInt(e.target.value) || 0));
                
                // Turn logic with Stepper buttons
                const updateTurn = (val) => {
                    const clamped = this.clampNumber(val, 1, 999);
                    this.ui.turnCount.value = clamped;
                    this.handleInput('turn', clamped);
                };
                this.ui.turnCount.addEventListener('input', (e) => updateTurn(e.target.value));
                this.ui.btnDecTurn.addEventListener('click', () => updateTurn(state.turn - 1));
                this.ui.btnIncTurn.addEventListener('click', () => updateTurn(state.turn + 1));
                
                this.ui.timeSelect.addEventListener('change', (e) => this.handleInput('timeEnvironment', e.target.value));
                this.ui.catchingCharm.addEventListener('change', (e) => this.handleInput('catchingCharm', e.target.checked));
                this.ui.registeredDex.addEventListener('change', (e) => this.handleInput('registeredDex', e.target.checked));

                this.ui.pokemonInput.addEventListener('input', (e) => this.handleSearch(e.target.value.toLowerCase().trim()));
                
                document.addEventListener('click', (e) => {
                    if(!this.ui.pokemonInput.contains(e.target) && !this.ui.searchResults.contains(e.target)) {
                        this.ui.searchResults.classList.add('hidden');
                    }
                });
            }

            clampNumber(val, min, max) {
                return Math.max(min, Math.min(max, parseInt(val) || min));
            }

            handleInput(stateKey, value, sideEffect = null) {
                state[stateKey] = value;
                if(sideEffect) sideEffect();
                this.triggerCalculation();
            }

            handleSearch(query) {
                const matches = this.api.fuzzySearch(query);
                if (matches.length === 0 && query.length >= 2) {
                    this.ui.searchResults.innerHTML = `<div class="p-4 text-xs font-semibold text-slate-500 text-center">Nenhum pokemon encontrado.</div>`;
                    this.ui.searchResults.classList.remove('hidden');
                    return;
                }
                
                if (matches.length > 0) {
                    this.ui.searchResults.innerHTML = matches.map(name => `
                        <div class="p-3 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition" data-name="${name}">
                            <span class="text-sm font-bold capitalize text-slate-800">${name}</span>
                            <i data-lucide="download" class="w-4 h-4 text-slate-300"></i>
                        </div>
                    `).join('');
                    
                    // Attach explicit event listeners instead of inline onclick (Avoids polluting global scope)
                    Array.from(this.ui.searchResults.children).forEach(node => {
                        node.addEventListener('click', () => this.selectPokemonProcess(node.getAttribute('data-name')));
                    });

                    lucide.createIcons();
                    this.ui.searchResults.classList.remove('hidden');
                } else {
                    this.ui.searchResults.classList.add('hidden');
                }
            }

            async selectPokemonProcess(name) {
                this.ui.pokemonInput.value = "Carregando dados...";
                this.ui.searchResults.classList.add('hidden');
                
                try {
                    const details = await this.api.fetchDetails(name);
                    
                    state.pokemon = { name: details.name, captureRate: details.captureRate };
                    state.pokeTypes = details.types;
                    
                    this.ui.pokemonInput.value = name.charAt(0).toUpperCase() + name.slice(1);
                    
                    this.ui.selectedInfo.querySelector('span').textContent = `Base Catch Rate: ${details.captureRate} | Tipos: ${state.pokeTypes.join(', ') || 'N/A'}`;
                    this.ui.selectedInfo.classList.remove('hidden');
                    
                    this.ui.baseCatchRateLabel.textContent = `Base: ${details.captureRate}`;
                    this.ui.baseCatchRateLabel.classList.remove('hidden');

                    this.triggerCalculation();
                } catch(e) {
                    this.ui.pokemonInput.value = "Erro na conexão API";
                    console.error(e);
                }
            }

            triggerCalculation() {
                if (!state.pokemon) return;
                const results = CatchMechanicsEngine.executeCatchRolls(state);
                this.renderResults(results);
            }

            renderResults(results) {
                this.ui.emptyState.classList.add('hidden');
                this.ui.resultsList.classList.remove('hidden');
                this.ui.resultsList.innerHTML = '';
                
                results.forEach((r, idx) => {
                    const isTop = idx === 0;
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-2xl flex items-center justify-between border transition-all duration-300 pokeball-card bg-white shadow-sm ${r.border}`;
                    if (isTop) {
                        card.classList.add('shadow-md', 'shadow-purple-100');
                        card.style.transform = 'scale(1.02)';
                    }

                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full ${r.color} flex items-center justify-center font-black ${isTop ? 'border-2 border-inherit ring-4 ring-white shadow-inner' : ''} overflow-hidden p-1 shadow-sm">
                               <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${r.id}-ball.png" alt="${r.name}" class="w-full h-full object-contain scale-125 drop-shadow-sm brightness-110">
                            </div>
                            <div>
                                <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                                    ${r.name} 
                                    ${isTop ? '<span class="text-[9px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full uppercase tracking-wider font-black">Recomendada</span>' : ''}
                                </h3>
                                <p class="text-[10px] uppercase font-bold text-slate-400 mt-1 tracking-wider">Modificador: ${r.modifier.toFixed(1)}x</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black ${this.getProbColor(r.prob)}">${r.prob.toFixed(1)}%</div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Chance</p>
                        </div>
                    `;
                    this.ui.resultsList.appendChild(card);
                });
            }

            getProbColor(prob) {
                if (prob >= 80) return 'text-emerald-500';
                if (prob >= 50) return 'text-amber-500';
                if (prob >= 25) return 'text-orange-500';
                return 'text-red-500';
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            window.App = new AppController();
        });
    </script>
</body>
</html>
