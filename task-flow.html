<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Flow - Renato</title>
    <script src="https://cdn.tailwindcss.com?v=3.4.17"></script>
    <script src="https://unpkg.com/lucide@0.469.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid white; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-10 min-h-screen relative">

    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Sincronizando Cloud...</p>
    </div>

    <div class="max-w-4xl mx-auto px-4 pt-6 md:pt-12 relative">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 bg-white rounded-xl shadow-sm border border-slate-100 text-slate-400 hover:text-indigo-600 transition shrink-0">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="text-2xl md:text-4xl font-800 tracking-tighter italic uppercase text-slate-900 leading-none">Task<span class="text-indigo-600">Flow</span></h1>
                    <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Provas e Entregas • Renato</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="document.getElementById('taskModal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold uppercase tracking-widest py-3 px-4 md:px-6 rounded-2xl shadow-lg shadow-indigo-600/30 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden md:inline">Novo</span>
                </button>
            </div>
        </header>

        <section id="deadlinesList" class="space-y-4">
            <!-- Rendered tasks go here -->
        </section>

        <!-- No tasks empty state -->
        <div id="emptyState" class="hidden py-20 text-center opacity-40">
            <i data-lucide="check-circle-2" class="w-12 h-12 mx-auto mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest">Tudo em dia!</p>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="taskModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4 bg-slate-900/40 backdrop-blur-sm transition-all duration-300">
        <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-white relative">
            <button onclick="document.getElementById('taskModal').classList.add('hidden')" class="absolute top-6 right-6 text-slate-400 hover:text-slate-800 transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h2 class="text-xl font-800 text-slate-800 mb-6">Novo Evento</h2>
            <form id="addForm" onsubmit="addDeadline(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Tipo</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="Prova" class="peer hidden" checked>
                                <div class="text-center py-3 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 peer-checked:bg-rose-50 peer-checked:border-rose-200 peer-checked:text-rose-600 transition">📝 Prova</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="Trabalho" class="peer hidden">
                                <div class="text-center py-3 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 peer-checked:bg-emerald-50 peer-checked:border-emerald-200 peer-checked:text-emerald-600 transition">📁 Trabalho</div>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Matéria</label>
                        <select id="subject" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-600/50" required>
                            <option value="SE616">SE616 - Economia Internacional I</option>
                            <option value="SE619">SE619 - Teoria Macroeconômica II</option>
                            <option value="SE615">SE615 - Elab. e Análise de Projetos I</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Data da Entrega / Prova</label>
                        <input type="date" id="date" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-600/50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Descrição (Ex: P1, Lista de Exercícios...)</label>
                        <input type="text" id="desc" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-600/50" placeholder="Digite sobre o que é..." required>
                    </div>
                    <button type="submit" id="saveBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl mt-6 transition-colors shadow-lg shadow-indigo-600/20">Salvar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9W4W6bDdH6p2GLi_TwG2XDd0yPNH8SEQ",
            authDomain: "academic-flow-3a2ef.firebaseapp.com",
            projectId: "academic-flow-3a2ef",
            storageBucket: "academic-flow-3a2ef.firebasestorage.app",
            messagingSenderId: "469639047695",
            appId: "1:469639047695:web:358d524690e08be504917a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const subjects = {
            "SE616": { name: "Economia Internacional I" },
            "SE619": { name: "Teoria Macroeconômica II" },
            "SE615": { name: "Elaboração e Análise de Projetos I" }
        };

        let deadlinesData = {};

        onSnapshot(doc(db, "users", "renato"), (snap) => {
            if (snap.exists() && snap.data().deadlines) {
                deadlinesData = snap.data().deadlines;
            } else {
                deadlinesData = {};
            }
            renderDeadlines();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        });

        window.addDeadline = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'Salvando...';
            btn.disabled = true;

            try {
                const type = document.querySelector('input[name="type"]:checked').value;
                const subject = document.getElementById('subject').value;
                const date = document.getElementById('date').value;
                const desc = document.getElementById('desc').value;
                const id = Date.now().toString();

                await setDoc(doc(db, "users", "renato"), {
                    deadlines: { [id]: { type, subject, date, desc } }
                }, { merge: true });

                document.getElementById('addForm').reset();
                document.getElementById('taskModal').classList.add('hidden');
            } catch (err) {
                console.error("Firebase update failed", err);
                alert("Erro ao salvar o evento. Verifique sua conexão e tente novamente.");
            } finally {
                btn.innerHTML = 'Salvar Evento';
                btn.disabled = false;
            }
        };

        window.removeDeadline = async (id, btn) => {
            if(!confirm("Tem certeza que deseja excluir?")) return;
            const tempHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
            
            try {
                await updateDoc(doc(db, "users", "renato"), {
                    [`deadlines.${id}`]: deleteField()
                });
            } catch (err) {
                console.error("Failed to delete", err);
                alert("Falha ao remover o evento. Você está online?");
                btn.innerHTML = tempHTML;
                lucide.createIcons();
            }
        };

        function renderDeadlines() {
            const container = document.getElementById('deadlinesList');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            const keys = Object.keys(deadlinesData);
            if(keys.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const sorted = keys.map(k => ({id: k, ...deadlinesData[k]})).sort((a,b) => new Date(a.date) - new Date(b.date));

            const today = new Date();
            today.setHours(0,0,0,0);

            sorted.forEach(item => {
                // Ensure timezone avoids single off-by-one bugs natively
                const itemParts = item.date.split('-');
                const itemDate = new Date(itemParts[0], itemParts[1] - 1, itemParts[2]);
                
                const diffTime = itemDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let daysText = '';
                let daysClass = 'bg-slate-100 text-slate-500';
                if(diffDays === 0) { daysText = 'É HOJE!'; daysClass = 'bg-rose-100 text-rose-600 animate-pulse border border-rose-200'; }
                else if(diffDays === 1) { daysText = 'AMANHÃ'; daysClass = 'bg-orange-100 text-orange-600 border border-orange-200'; }
                else if(diffDays < 0) { daysText = 'VENCIDO'; daysClass = 'bg-red-800 text-white rounded-lg px-2'; }
                else if (diffDays <= 3) { daysText = `Faltam ${diffDays} dias`; daysClass = 'bg-orange-50 border border-orange-200 text-orange-600'; }
                else { daysText = `Faltam ${diffDays} dias`; daysClass = 'bg-indigo-50 border border-indigo-200 text-indigo-600'; }

                const typeColor = item.type === 'Prova' ? 'text-rose-500 bg-rose-50 border border-rose-100' : 'text-emerald-500 bg-emerald-50 border border-emerald-100';
                const typeIcon = item.type === 'Prova' ? 'pen-tool' : 'folder-kanban';

                const html = `
                    <div class="glass-panel p-5 rounded-3xl flex items-center justify-between group transition hover:-translate-y-1">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${typeColor}">
                                <i data-lucide="${typeIcon}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black uppercase text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md">${item.subject}</span>
                                    <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-md ${daysClass}">${daysText}</span>
                                </div>
                                <h3 class="text-sm md:text-base font-800 text-slate-800 leading-tight">${item.desc}</h3>
                                <p class="text-[10px] md:text-xs font-semibold text-slate-400 mt-1">${subjects[item.subject]?.name || 'Materia Desconhecida'} • ${itemDate.toLocaleDateString('pt-BR')}</p>
                            </div>
                        </div>
                        <button onclick="removeDeadline('${item.id}', this)" class="text-slate-300 hover:text-rose-500 hover:bg-rose-50 p-3 rounded-xl transition opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
                container.innerHTML += html;
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
