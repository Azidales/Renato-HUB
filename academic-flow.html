<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Flow - Renato</title>
    <script src="https://cdn.tailwindcss.com?v=3.4.17"></script>
    <script src="https://unpkg.com/lucide@0.469.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        /* day-card kept minimal, complex states moved to tailwind */
        .day-card { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.875rem; transition: 0.2s; cursor: pointer; border: 1px solid transparent; }
        .today { outline: 2px solid #2563eb; outline-offset: 1px; border-radius: 12px; }

        @media (min-width: 768px) {
            .tab-content { display: block !important; }
            nav.mobile-nav { display: none; }
            .desktop-grid { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
        }
        @media (max-width: 767px) {
            .tab-content { display: none; }
            .tab-active { display: block; animation: fadeIn 0.3s ease forwards; }
            .nav-active { color: #2563eb !important; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-10">

    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Sincronizando Cloud...</p>
    </div>

    <!-- Sync Alert para modo offline -->
    <div id="offlineAlert" class="fixed top-4 left-1/2 -translate-x-1/2 bg-orange-100 text-orange-600 border border-orange-200 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-orange-500/10 transition-opacity opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="wifi-off" class="w-3 h-3"></i> Modo Offline - Salvando Localmente
    </div>

    <div class="max-w-6xl mx-auto px-4 pt-6 md:pt-12">
        <header class="flex justify-between items-center mb-8 md:mb-12">
            <div class="flex items-center gap-4">
                <a href="index.html" aria-label="Voltar para o Hub Central" class="p-2 bg-white rounded-xl shadow-sm border border-slate-100 text-slate-400 hover:text-blue-600 transition shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="text-2xl md:text-4xl font-800 tracking-tighter italic uppercase text-slate-900 leading-none">Academic<span class="text-blue-600">Flow</span></h1>
                    <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Dashboard • Renato</p>
                </div>
            </div>
            <div class="h-10 w-10 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-lg shrink-0">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
        </header>

        <div class="desktop-grid">
            <div class="space-y-8">
                <section id="tab-summary" class="tab-content tab-active" aria-label="Faltas Acumuladas">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-3 h-3"></i> Faltas Acumuladas
                    </h2>
                    <div id="summary-container" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
                </section>

                <section id="tab-calendar" class="tab-content" aria-label="Calendário Acadêmico">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-3 h-3"></i> Calendário
                    </h2>
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white">
                        <div class="flex justify-between items-center mb-8">
                            <h3 id="monthDisplay" class="font-800 text-xl text-slate-800" aria-live="polite"></h3>
                            <div class="flex gap-2">
                                <button onclick="changeMonth(-1)" aria-label="Mês anterior" class="p-2 hover:bg-slate-50 rounded-xl transition text-slate-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600"><i data-lucide="chevron-left"></i></button>
                                <button onclick="changeMonth(1)" aria-label="Próximo mês" class="p-2 hover:bg-slate-50 rounded-xl transition text-slate-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600"><i data-lucide="chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="calendar-grid text-center text-[10px] font-black text-slate-300 mb-4 uppercase" aria-hidden="true">
                            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                        </div>
                        <!-- Container para o calendário (WCAG: role grid) -->
                        <div id="calendarDays" class="calendar-grid gap-2" role="grid" aria-label="Grade do Calendário"></div>
                    </div>
                </section>
            </div>

            <aside id="tab-today" class="tab-content mt-8 md:mt-0" aria-label="Detalhes e Registro de Presença">
                <div class="sticky top-12">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="info" class="w-3 h-3"></i> Registro de Presença
                    </h2>
                    <div id="dayDetails" class="bg-white/70 backdrop-blur-xl p-6 rounded-[2rem] border border-white shadow-xl min-h-[300px]" aria-live="assertive">
                        <div class="flex flex-col items-center justify-center py-20 text-center opacity-30">
                            <i data-lucide="mouse-pointer-click" class="w-12 h-12 mb-4"></i>
                            <p class="text-xs font-bold uppercase tracking-widest">Selecione uma data</p>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Navegação Mobile WCAG Refatorada -->
    <nav class="mobile-nav fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md rounded-full px-8 py-4 flex justify-between items-center z-40 shadow-xl shadow-slate-200/80 border border-slate-100" aria-label="Navegação inferior">
        <button onclick="switchTab('summary', this)" aria-label="Ver Faltas Acumuladas" class="flex flex-col items-center gap-1 text-slate-300 nav-active focus-visible:outline-none focus-visible:text-blue-600">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
        </button>
        <button onclick="switchTab('calendar', this)" aria-label="Ver Calendário" class="flex flex-col items-center gap-1 text-slate-300 focus-visible:outline-none focus-visible:text-blue-600">
            <i data-lucide="calendar" class="w-5 h-5"></i>
        </button>
        <button id="todayBtn" onclick="switchTab('today', this)" aria-label="Ver Dia Focado" class="flex flex-col items-center gap-1 text-slate-300 focus-visible:outline-none focus-visible:text-blue-600">
            <i data-lucide="check-square" class="w-5 h-5"></i>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9W4W6bDdH6p2GLi_TwG2XDd0yPNH8SEQ",
            authDomain: "academic-flow-3a2ef.firebaseapp.com",
            projectId: "academic-flow-3a2ef",
            storageBucket: "academic-flow-3a2ef.firebasestorage.app",
            messagingSenderId: "469639047695",
            appId: "1:469639047695:web:358d524690e08be504917a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fallback Initial Structure for Firebase Seed
        const fallbackSubjects = {
            "SE616": { name: "Economia Internacional I", days: [1, 3], start: {1: "21:00", 3: "19:00"} },
            "SE619": { name: "Teoria Macroeconômica II", days: [3, 5], start: {3: "21:00", 5: "19:00"} },
            "SE615": { name: "Elaboração e Análise de Projetos I", days: [1, 4], start: {1: "19:00", 4: "21:00"} }
        };

        let subjects = {};
        let statusData = {};
        let currentDate = new Date();

        // OFFLINE QUEUE MECHANISM
        window.addEventListener("online", flushSyncQueue);
        window.addEventListener("offline", () => showOfflineAlert(true));
        
        function showOfflineAlert(show) {
            const al = document.getElementById('offlineAlert');
            if(show) { al.style.opacity = '1'; } else { al.style.opacity = '0'; }
        }

        async function flushSyncQueue() {
            showOfflineAlert(false);
            const queueStr = localStorage.getItem('academic_offline_queue');
            if (!queueStr) return;
            try {
                const queue = JSON.parse(queueStr);
                if (queue.length === 0) return;
                const docRef = doc(db, "users", "renato");
                
                for (const event of queue) {
                    if (event.action === 'delete') {
                        await updateDoc(docRef, { [`absences.${event.date}.${event.subId}`]: deleteField() });
                    } else {
                        await setDoc(docRef, { absences: { [event.date]: { [event.subId]: event.status } } }, { merge: true });
                    }
                }
                localStorage.removeItem('academic_offline_queue');
                console.log("Fila local sincronizada com Firebase.");
            } catch (err) {
                console.error("Falha ao sincronizar fila offline.", err);
            }
        }

        // FIREBASE DYNAMIC INGESTION (Seed & Read)
        onSnapshot(doc(db, "users", "renato"), async (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                statusData = data.absences || {};
                
                // Seed Strategy Validation
                if (!data.subjectsSettings) {
                    try {
                        await setDoc(doc(db, "users", "renato"), { subjectsSettings: fallbackSubjects }, { merge: true });
                        subjects = fallbackSubjects;
                    } catch(e) {
                         subjects = fallbackSubjects; // If offline during first load, use fallback
                    }
                } else {
                    subjects = data.subjectsSettings;
                }
            } else {
                statusData = {};
                subjects = fallbackSubjects;
            }
            renderAll();
            const loader = document.getElementById('loader');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        });

        window.switchTab = (tabId, btn) => {
            if (window.innerWidth < 768) {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
                document.getElementById('tab-' + tabId).classList.add('tab-active');
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
                btn.classList.add('nav-active');
                lucide.createIcons();
            }
        };

        window.setStatus = async (date, subId, status, btn) => {
            // UI Optimistic Update
            const tempHTML = btn.innerHTML;
            btn.innerHTML = `<span class="animate-pulse">...</span>`;

            const isToggleOff = statusData[date]?.[subId] === status;

            // Trigger instant UI re-render mimicking local persistence
            if(!statusData[date]) statusData[date] = {};
            if(isToggleOff) {
                delete statusData[date][subId];
            } else {
                statusData[date][subId] = status;
            }
            
            // Re-render local structures
            window.showDay(date, new Date(date.split('-')[0], date.split('-')[1]-1, date.split('-')[2]).getDay());

            // Real Firebase write
            try {
                const docRef = doc(db, "users", "renato");
                if (isToggleOff) {
                    await updateDoc(docRef, { [`absences.${date}.${subId}`]: deleteField() });
                } else {
                    await setDoc(docRef, { absences: { [date]: { [subId]: status } } }, { merge: true });
                }
                btn.innerHTML = tempHTML; // Restore cleanly if successful without full snapshot redraw
            } catch (err) {
                console.warn("Salvando offline (fila local)...");
                showOfflineAlert(true);
                let queue = [];
                try { queue = JSON.parse(localStorage.getItem('academic_offline_queue')) || []; } catch(e){}
                queue.push({ action: isToggleOff ? 'delete' : 'save', date, subId, status });
                localStorage.setItem('academic_offline_queue', JSON.stringify(queue));
            }
        };

        window.changeMonth = (s) => { currentDate.setMonth(currentDate.getMonth() + s); renderAll(); };

        window.handleDayKeypress = (e, dk, dw) => { if(e.key === 'Enter' || e.key === ' ') { window.showDay(dk, dw); e.preventDefault(); } };

        window.showDay = (dateKey, dayOfWeek) => {
            const container = document.getElementById('dayDetails');
            const dateFmt = dateKey.split('-').reverse().join('/');
            const dayName = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"][dayOfWeek];
            
            let html = `<div class="mb-6"><h3 class="text-xl font-800">${dateFmt}</h3><p class="text-[10px] font-black uppercase text-blue-600">${dayName}</p></div><div class="space-y-4">`;
            let found = false;

            Object.keys(subjects).forEach(id => {
                if (subjects[id].days.includes(dayOfWeek)) {
                    found = true;
                    // Provide safe fallback object values due to dynamic backend source
                    const subDaysConf = subjects[id].start || {}; 
                    const startTime = subDaysConf[dayOfWeek] || '--:--';
                    
                    const st = statusData[dateKey]?.[id];
                    html += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm" role="region" aria-label="Aula de ${subjects[id].name}">
                            <div class="flex justify-between items-center mb-4 text-[10px] font-black">
                                <span class="text-slate-300 uppercase">${id}</span>
                                <span class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded-lg">${startTime}h</span>
                            </div>
                            <h4 class="text-xs font-bold text-slate-700 mb-5 leading-snug">${subjects[id].name}</h4>
                            <div class="grid grid-cols-3 gap-1">
                                <button aria-label="Marcar como presente" aria-pressed="${st === 'present'}" onclick="window.setStatus('${dateKey}', '${id}', 'present', this)" class="py-2.5 rounded-xl text-[9px] font-800 border transition outline-none focus-visible:ring-2 focus-visible:ring-blue-600 ${st==='present'?'bg-blue-600 text-white border-blue-600':'bg-white text-blue-600 border-blue-50 hover:bg-blue-50'}">PRESENTE</button>
                                <button aria-label="Marcar como falta" aria-pressed="${st === 'absent'}" onclick="window.setStatus('${dateKey}', '${id}', 'absent', this)" class="py-2.5 rounded-xl text-[9px] font-800 border transition outline-none focus-visible:ring-2 focus-visible:ring-red-500 ${st==='absent'?'bg-red-500 text-white border-red-500':'bg-white text-red-500 border-red-50 hover:bg-red-50'}">FALTEI</button>
                                <button aria-label="Marcar como cancelada" aria-pressed="${st === 'cancelled'}" onclick="window.setStatus('${dateKey}', '${id}', 'cancelled', this)" class="py-2.5 rounded-xl text-[9px] font-800 border transition outline-none focus-visible:ring-2 focus-visible:ring-slate-500 ${st==='cancelled'?'bg-slate-400 text-white border-slate-400':'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}">CANCELADA</button>
                            </div>
                        </div>`;
                }
            });

            if(!found) html = `<div class="py-20 text-center opacity-30"><i data-lucide="coffee" class="w-10 h-10 mx-auto mb-2"></i><p class="text-[10px] font-bold uppercase tracking-widest">Sem Aulas</p></div>`;
            
            container.innerHTML = html + `</div>`;
            if (window.innerWidth < 768) {
                const btn = document.getElementById('todayBtn');
                if(btn) window.switchTab('today', btn);
            }
            lucide.createIcons();
        };

        // TAILWIND PURE LOGIC REFACTOR (No more custom ugly css tags)
        function getDayClass(st) {
            const vals = Object.values(st);
            const hasP = vals.includes('present');
            const hasA = vals.includes('absent');
            const hasC = vals.includes('cancelled');

            // Compound specific states parsed dynamically using Tailwind Gradients
            if (hasP && hasA)          return 'bg-gradient-to-br from-blue-50 via-white to-red-50 text-slate-500 font-800 border-x-blue-200 border-y-red-200';
            if (hasP && hasC && !hasA) return 'bg-gradient-to-br from-blue-50 to-slate-200 text-slate-500 font-800 border-blue-200';
            if (hasA && hasC && !hasP) return 'bg-gradient-to-br from-red-50 to-slate-200 text-slate-500 font-800 border-red-200';
            if (hasP) return 'bg-blue-50 text-blue-600 font-800 border-blue-200';
            if (hasA) return 'bg-red-50 text-red-500 font-800 border-red-200';
            if (hasC) return 'bg-slate-200 text-slate-400 font-bold border-slate-300';
            return '';
        }

        function renderAll() {
            const sumContainer = document.getElementById('summary-container');
            sumContainer.innerHTML = '';
            
            // Wait for seeding if needed
            if (Object.keys(subjects).length > 0) {
                Object.keys(subjects).forEach(id => {
                    const faults = Object.values(statusData).filter(d => d[id] === 'absent').length;
                    sumContainer.innerHTML += `<div class="bg-white p-5 rounded-3xl border border-white flex justify-between items-center shadow-xl shadow-slate-200/50" role="region" aria-label="Acumulado ${id}"><div class="flex-1 mr-4"><p class="text-[9px] font-black text-slate-300 uppercase leading-none mb-1" aria-hidden="true">${id}</p><h4 class="text-xs font-bold text-slate-800 leading-snug">${subjects[id].name}</h4></div><div class="text-2xl font-800 shrink-0 ${faults>4?'text-red-500':'text-blue-600'}" aria-label="${faults} faltas">${faults}</div></div>`;
                });
            }

            const cal = document.getElementById('calendarDays');
            const disp = document.getElementById('monthDisplay');
            cal.innerHTML = '';
            
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const raw = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(currentDate);
            disp.innerText = raw.charAt(0).toUpperCase() + raw.slice(1);

            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            const now = new Date(), todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            for(let i=0; i<first; i++) cal.innerHTML += `<div role="gridcell" aria-label="Espaço vazio"></div>`;
            
            for(let d=1; d<=days; d++){
                const dk = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dw = new Date(y,m,d).getDay();
                
                let has = false; 
                Object.values(subjects).forEach(s => { 
                    const safeDays = s.days || [];
                    if(safeDays.includes(dw)) has=true; 
                });
                
                const st = statusData[dk] || {};
                const statusClass = Object.keys(st).length > 0 ? getDayClass(st) : '';
                
                // Using Tailwind equivalents for NO-CLASS
                const baseClass = has ? 'bg-slate-50 text-slate-800 font-bold hover:bg-slate-100' : 'bg-slate-50/40 text-slate-400 border-slate-100 hover:bg-slate-50';
                
                cal.innerHTML += `<div role="button" tabindex="0" aria-label="Dia ${d}. ${has ? 'Possui aula.' : 'Sem aula.'}" onclick="window.showDay('${dk}', ${dw})" onkeydown="window.handleDayKeypress(event, '${dk}', ${dw})" class="day-card ${statusClass || baseClass} ${dk===todayKey?'today':''} focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600">${d}</div>`;
            }
            lucide.createIcons();
            
            // Check initial connectivity
            if(!navigator.onLine) showOfflineAlert(true);
        }
    </script>
</body>
</html>
